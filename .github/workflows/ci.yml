name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Placeholder so `next build` doesn't fail on a missing public env var.
      # The real value is configured in Vercel (and your local .env.local).
      NEXT_PUBLIC_API_URL: http://localhost:8000/api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
